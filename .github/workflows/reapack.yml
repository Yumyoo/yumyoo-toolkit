name: ReaPack-Index

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: reapack-index
        uses: cfillion/reapack-index@v1
        with:
          commit: true
          push: true
